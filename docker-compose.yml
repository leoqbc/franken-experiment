services:
  server:
    image: webdevops/php-nginx:8.5-alpine
    working_dir: /app
    ports:
      - "8080:80"
    volumes:
      - ".:/app"
    environment:
      PHP_DISPLAY_ERRORS: 1
      WEB_DOCUMENT_ROOT: /app/public

  mariadb:
    image: mariadb:12.0
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: franken_test
      MARIADB_ROOT_PASSWORD: 123456